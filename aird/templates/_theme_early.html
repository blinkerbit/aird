{# Blocking theme init — must be first in <head> to prevent light flash #}
<script nonce="{{ csp_nonce }}">
(function () {
  var THEMES = ['light', 'dark', 'nord', 'dracula', 'cyberpunk', 'retro', 'autumn'];
  var DARK = { dark: 1, dracula: 1 };
  /* DaisyUI default base-100 (hex) — must match theme.js BG map */
  var BG = {
    light: '#ffffff',
    dark: '#1d232a',
    nord: '#eceff4',
    dracula: '#282a36',
    cyberpunk: '#ffee00',
    retro: '#e4d8b4',
    autumn: '#faf1e9'
  };
  var key = 'aird_theme';
  var cookieRe = new RegExp(String.raw`(?:^|; )${key}=([^;]*)`);
  var m = document.cookie.match(cookieRe);
  var t = m ? decodeURIComponent(m[1]) : null;
  if (!t || !THEMES.includes(t)) {
    t = (globalThis.matchMedia && matchMedia('(prefers-color-scheme: dark)').matches) ? 'dark' : 'light';
  }
  var root = document.documentElement;
  root.dataset.theme = t;
  root.style.colorScheme = DARK[t] ? 'dark' : 'light';
  root.style.backgroundColor = BG[t] || BG.light;
  root.classList.add('theme-early');
})();
</script>
