<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="/static/css/app.css" />
  <title>Directory listing · Aird</title>
</head>
<body class="bg-base-200 min-h-screen">
  <div class="max-w-4xl mx-auto p-4">
    <header class="mb-4 pb-3 border-b border-base-300">
      <h1 class="text-2xl font-bold">All directories</h1>
      <nav class="text-sm text-base-content/50 mt-1" aria-label="Breadcrumb"><a href="/" class="text-base-content hover:text-primary">🏠 Home</a></nav>
    </header>

    <div class="card bg-base-100 shadow-sm border border-base-300">
      <div class="card-body p-0">
        {% for dir in dirs %}
        <a href="{{ escape(dir.path) }}" class="flex items-center gap-3 px-4 py-3 border-b border-base-200 hover:bg-base-200 transition-colors text-base-content no-underline">
          <span aria-hidden="true">📁</span>
          <span>{{ escape(dir.name) }}</span>
        </a>
        {% end %}
        {% if not dirs %}
        <div class="text-center py-8 text-base-content/50">📭 No directories found.</div>
        {% end %}
      </div>
    </div>
  </div>
  <script src="/static/js/theme.js"></script>
</body>
</html>
