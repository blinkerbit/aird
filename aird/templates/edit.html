<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="/static/css/app.css" />
  <title>Edit {{ filename }}</title>
  <style>
    body { background: var(--ds-bg); margin: 0; }

    header.edit-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--ds-space-3);
      flex-wrap: wrap;
      padding: 10px 16px;
      background: var(--ds-surface);
      border-bottom: 1px solid var(--ds-border);
      box-shadow: var(--ds-shadow-xs);
    }
    .edit-title { display: flex; flex-direction: column; line-height: 1.3; min-width: 0; }
    .edit-title .crumbs { font-size: var(--ds-fs-xs); color: var(--ds-text-muted); }
    .edit-title .crumbs a { color: var(--ds-text); }
    .edit-title .file { font-weight: 700; font-size: var(--ds-fs-md); }
    .edit-title .path { font-size: var(--ds-fs-xs); color: var(--ds-text-subtle); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 540px; }

    .edit-actions { display: flex; gap: var(--ds-space-2); align-items: center; flex-wrap: wrap; }
    .edit-actions .user-chip { color: var(--ds-text-muted); font-size: var(--ds-fs-sm); text-decoration: none; }
    .edit-actions .user-chip:hover { color: var(--ds-text); text-decoration: none; }

    button.edit-btn, a.edit-btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 7px 12px; min-height: 32px;
      background: var(--ds-surface); color: var(--ds-text);
      border: 1px solid var(--ds-border);
      border-radius: var(--ds-radius-sm);
      font: inherit; font-size: var(--ds-fs-sm); font-weight: 600; line-height: 1;
      cursor: pointer; text-decoration: none;
      transition: background var(--ds-duration-fast) var(--ds-ease), border-color var(--ds-duration-fast) var(--ds-ease);
    }
    button.edit-btn:hover, a.edit-btn:hover { background: var(--ds-bg-muted); border-color: var(--ds-border-strong); text-decoration: none; }
    button.edit-btn[disabled] { opacity: 0.55; cursor: not-allowed; }
    button.edit-btn.primary { background: var(--ds-primary); color: var(--ds-text-on-accent); border-color: var(--ds-primary); }
    button.edit-btn.primary:hover { background: var(--ds-primary-hover); border-color: var(--ds-primary-hover); }
    button.edit-btn.active-tab { background: var(--ds-bg-sunken); border-color: var(--ds-border-strong); }

    .status { font-size: var(--ds-fs-sm); color: var(--ds-text-muted); margin-left: 10px; min-width: 120px; }

    .editor-wrap, .preview-wrap {
      display: flex;
      height: calc(100vh - 64px);
      margin: var(--ds-space-3) var(--ds-space-4);
      border: 1px solid var(--ds-border);
      border-radius: var(--ds-radius-md);
      overflow: hidden;
      background: var(--ds-surface);
      box-shadow: var(--ds-shadow-xs);
    }
    .preview-wrap { overflow: auto; padding: var(--ds-space-5); }
    .markdown-preview { max-width: 820px; margin: 0 auto; line-height: var(--ds-lh-relaxed); font-family: var(--ds-font-sans); }
    .markdown-preview h1, .markdown-preview h2, .markdown-preview h3 { margin-top: 1em; margin-bottom: 0.5em; }
    .markdown-preview pre { background: var(--ds-bg-muted); padding: var(--ds-space-3); border: 1px solid var(--ds-border-muted); border-radius: var(--ds-radius-sm); overflow: auto; }
    .markdown-preview code { background: var(--ds-bg-muted); border: 1px solid var(--ds-border-muted); padding: 1px 5px; border-radius: var(--ds-radius-xs); }
    .markdown-preview blockquote { border-left: 4px solid var(--ds-border); margin: 0; padding: 4px 12px; color: var(--ds-text-muted); background: var(--ds-bg-muted); border-radius: 0 var(--ds-radius-sm) var(--ds-radius-sm) 0; }

    .gutter {
      width: 48px;
      padding: 6px 8px 6px 4px;
      background-color: var(--ds-bg-muted);
      color: var(--ds-text-subtle);
      text-align: right;
      border-right: 1px solid var(--ds-border-muted);
      overflow: hidden;
      white-space: pre;
      line-height: 1.4em;
      font-family: var(--ds-font-mono);
      font-size: var(--ds-fs-sm);
      user-select: none;
    }
    textarea#editor {
      flex: 1;
      height: 100%;
      border: 0;
      outline: none;
      padding: 6px 10px;
      font-family: var(--ds-font-mono);
      font-size: var(--ds-fs-sm);
      line-height: 1.4em;
      resize: none;
      white-space: pre;
      overflow: auto;
      background: var(--ds-surface);
      color: var(--ds-text);
    }
  </style>
</head>

<body>
  <header class="edit-header">
    <div class="edit-title">
      <div class="crumbs"><a href="/files/">🏠 Home</a>  Editing</div>
      <div class="file">{{ filename }}</div>
      <div class="path" title="/{{ path }}">/{{ path }}</div>
    </div>
    <div class="edit-actions">
      <a href="/profile" class="user-chip" title="Profile">👤 {{ handler.get_display_username() }}</a>
      {% if is_markdown %}
      <button id="tabEdit" type="button" class="edit-btn active-tab">✏ Edit</button>
      <button id="tabPreview" type="button" class="edit-btn">👁 Preview</button>
      {% end %}
      <button id="backBtn" type="button" class="edit-btn">← Back</button>
      <button id="saveBtn" type="button" class="edit-btn primary" title="Save (Ctrl/Cmd+S)">💾 Save</button>
      <a href="/logout" class="edit-btn">↩ Logout</a>
      <span id="status" class="status"></span>
    </div>
  </header>
  {% if is_markdown %}
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/16.3.0/marked.min.js" integrity="sha512-gxBP/mcwo9A5lJDFbVfXNb1hSLpOkHLLXAjld8HfCWjVIZnA3nlNnIqSTLvtwF4t55Dt4Rzh7phL3tJuKZ+teQ==" crossorigin="anonymous" referrerpolicy="no-referrer" nonce="{{ csp_nonce }}"></script>
  {% end %}
  <input type="hidden" id="path" value="/{{ path }}" />
  <div class="editor-wrap" id="editorWrap">
    <div id="gutter" class="gutter"></div>
    <textarea id="editor" spellcheck="false" wrap="off">{{ full_file_content }}</textarea>
  </div>
  <div id="previewWrap" class="preview-wrap" style="display: none;">
    <div id="markdownPreview" class="markdown-preview"></div>
  </div>

  <script nonce="{{ csp_nonce }}">
    const path = document.getElementById('path').value;
    const saveBtn = document.getElementById('saveBtn');
    const statusEl = document.getElementById('status');
    const editor = document.getElementById('editor');
    const gutter = document.getElementById('gutter');
    let dirty = false;

    function setStatus(text, ok = true) {
      statusEl.textContent = text || '';
      statusEl.style.color = ok ? 'var(--ds-success)' : 'var(--ds-danger)';
    }

    function updateLineNumbers() {
      const lines = (editor.value.match(/\n/g) || []).length + 1;
      let buf = '';
      for (let i = 1; i <= lines; i++) buf += i + (i === lines ? '' : '\n');
      gutter.textContent = buf;
    }

    editor.addEventListener('input', () => {
      dirty = true;
      setStatus('● Unsaved changes', true);
      updateLineNumbers();
    });

    editor.addEventListener('scroll', () => { gutter.scrollTop = editor.scrollTop; });
    gutter.addEventListener('wheel', (e) => {
      editor.scrollTop += e.deltaY;
      e.preventDefault();
    }, { passive: false });

    window.addEventListener('beforeunload', (e) => {
      if (dirty) { e.preventDefault(); e.returnValue = ''; }
    });

    function getXSRFToken() {
      const match = document.cookie.match(/_xsrf=([^;]*)/);
      return match ? decodeURIComponent(match[1]) : '';
    }

    async function save() {
      saveBtn.disabled = true;
      setStatus('Saving');
      try {
        const res = await fetch('/edit', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Accept': 'application/json',
            'X-XSRFToken': getXSRFToken()
          },
          body: JSON.stringify({ path, content: editor.value })
        });
        if (!res.ok) {
          const txt = await res.text();
          throw new Error(txt || 'Save failed');
        }
        dirty = false;
        setStatus('✓ Saved', true);
      } catch (err) {
        setStatus('✗ ' + (err.message || 'Save failed'), false);
      } finally {
        saveBtn.disabled = false;
      }
    }

    saveBtn.addEventListener('click', (e) => { e.preventDefault(); save(); });
    document.addEventListener('keydown', (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 's') {
        e.preventDefault();
        save();
      }
    });

    updateLineNumbers();
    gutter.scrollTop = editor.scrollTop;

    document.getElementById('backBtn').addEventListener('click', function () { history.back(); });

    {% if is_markdown %}
    (function() {
      const editorWrap = document.getElementById('editorWrap');
      const previewWrap = document.getElementById('previewWrap');
      const tabEdit = document.getElementById('tabEdit');
      const tabPreview = document.getElementById('tabPreview');
      const previewEl = document.getElementById('markdownPreview');
      function showEdit() {
        editorWrap.style.display = 'flex';
        previewWrap.style.display = 'none';
        if (tabEdit) tabEdit.classList.add('active-tab');
        if (tabPreview) tabPreview.classList.remove('active-tab');
      }
      function showPreview() {
        editorWrap.style.display = 'none';
        previewWrap.style.display = 'flex';
        if (tabPreview) tabPreview.classList.add('active-tab');
        if (tabEdit) tabEdit.classList.remove('active-tab');
        if (typeof marked !== 'undefined' && previewEl) {
          previewEl.innerHTML = marked.parse(editor.value);
        }
      }
      if (tabEdit) tabEdit.addEventListener('click', showEdit);
      if (tabPreview) tabPreview.addEventListener('click', showPreview);
    })();
    {% end %}
  </script>
  <script src="/static/js/theme.js"></script>
</body>

</html>
