{# Floating theme selector for login/admin-login pages — matches header theme list order. #}
<div class="absolute top-4 right-4">
  <div class="dropdown dropdown-end">
    <button type="button" tabindex="0" class="btn btn-ghost btn-sm" aria-haspopup="menu">
      🎨 Theme
    </button>
    <ul class="dropdown-content menu bg-base-100 rounded-box z-50 w-44 p-2 shadow-lg border border-base-300">
      <li><button type="button" data-set-theme="light">☀️ Light</button></li>
      <li><button type="button" data-set-theme="dark">🌙 Dark</button></li>
      <li><button type="button" data-set-theme="nord">❄️ Nord</button></li>
      <li><button type="button" data-set-theme="dracula">🧛 Dracula</button></li>
      <li><button type="button" data-set-theme="cyberpunk">🤖 Cyberpunk</button></li>
      <li><button type="button" data-set-theme="retro">📺 Retro</button></li>
      <li><button type="button" data-set-theme="autumn">🍂 Autumn</button></li>
    </ul>
  </div>
</div>
