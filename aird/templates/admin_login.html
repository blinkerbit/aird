<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="/static/css/app.css" />
  <title>Admin login  Aird</title>
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--ds-space-6) var(--ds-space-4);
      background:
        radial-gradient(var(--ds-border-muted) 1px, transparent 1px) 0 0/22px 22px,
        var(--ds-bg);
    }
    .adm-login-shell { width: 100%; max-width: 480px; }
    .adm-login-card { padding: var(--ds-space-8); }
    .adm-login-head { text-align: center; margin-bottom: var(--ds-space-5); }
    .adm-login-head h1 { margin: 0 0 var(--ds-space-1); }
    .adm-login-head p  { margin: 0; color: var(--ds-text-muted); font-size: var(--ds-fs-sm); }
    .adm-sep {
      display: flex; align-items: center; gap: var(--ds-space-3);
      color: var(--ds-text-subtle); font-size: var(--ds-fs-xs);
      text-transform: uppercase; letter-spacing: 0.12em;
      margin: var(--ds-space-5) 0;
    }
    .adm-sep::before, .adm-sep::after { content: ''; flex: 1; border-bottom: 1px solid var(--ds-border-muted); }
  </style>
</head>

<body>
  <div class="adm-login-shell">
    <div class="ds-card adm-login-card">
      <div class="adm-login-head">
        <h1>⚙ Admin login</h1>
        <p>Sign in with an administrator account or admin token</p>
      </div>

      {% if error %}
      <div class="ds-alert ds-alert--danger" role="alert">
        <span class="ds-alert__icon" aria-hidden="true">⚠</span>
        <span>{{ escape(error) }}</span>
      </div>
      {% end %}

      <form method="POST" class="ds-stack">
        {% raw xsrf_form_html() %}
        <div class="ds-field">
          <label class="ds-label" for="adm-username">Username</label>
          <input class="ds-input" type="text" id="adm-username" name="username"
                 placeholder="admin-username" autocomplete="username">
        </div>
        <div class="ds-field">
          <label class="ds-label" for="adm-password">Password</label>
          <input class="ds-input" type="password" id="adm-password" name="password"
                 placeholder="" autocomplete="current-password">
        </div>
        <button type="submit" class="ds-btn ds-btn--primary ds-btn--block">Sign in</button>
      </form>

      <div class="adm-sep">or</div>

      <form method="POST" class="ds-stack">
        {% raw xsrf_form_html() %}
        <div class="ds-field">
          <label class="ds-label" for="adm-token">Admin token</label>
          <input class="ds-input" type="password" id="adm-token" name="token"
                 placeholder="Paste admin token" autocomplete="off">
        </div>
        <button type="submit" class="ds-btn ds-btn--block">Sign in with token</button>
      </form>
    </div>
  </div>
  <script src="/static/js/theme.js"></script>
</body>

</html>
