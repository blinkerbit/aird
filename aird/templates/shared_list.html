<!DOCTYPE html>
<html lang="en">
<head>
  {% include '_theme_early.html' %}
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/static/css/app.css?v={{ static_version }}" />
  <link rel="icon" href="/static/favicon.png" type="image/png" />
  <title>Shared files · Aird</title>
    <style>
    .folder-summary::-webkit-details-marker { display: none; }
    .folder-summary::before {
      content: '▶'; display: inline-block; width: 1em; margin-right: 8px;
      font-size: 10px; opacity: 0.4; transition: transform 0.12s ease;
    }
    details[open] > .folder-summary::before { transform: rotate(90deg); }
  </style>
</head>
<body class="bg-base-200 min-h-screen">
  <div class="max-w-4xl mx-auto p-4">
    <header class="flex items-center justify-between gap-3 mb-4 pb-3 border-b border-base-300">
      <div class="flex items-center gap-2">
        <img src="/static/img/logo-icon.png" alt="" class="h-7 w-auto shrink-0">
        <h1 class="text-xl font-bold">Shared files</h1>
      </div>
      <span class="flex items-center gap-2 text-sm text-base-content/60">
        Access:
        {% if can_modify %}
        <span class="badge badge-primary badge-sm">Modify</span>
        {% else %}
        <span class="badge badge-ghost badge-sm">Read-only</span>
        {% end %}
      </span>
    </header>

    <div id="downloadProgressContainer" class="mb-3"></div>

    <div class="flex flex-wrap items-center gap-3 mb-3" id="bulkDownloadBar">
      <label class="label cursor-pointer justify-start gap-2 py-0">
        <input type="checkbox" id="selectAllFiles" class="checkbox checkbox-sm checkbox-primary" title="Select all files">
        <span class="label-text font-medium">Select all</span>
      </label>
      <button type="button" id="downloadSelectedBtn" class="btn btn-primary btn-sm" disabled>
        Download selected
      </button>
      <span id="selectionCount" class="text-sm text-base-content/60"></span>
    </div>

    <section class="bg-base-100 border border-base-300 rounded-xl overflow-hidden shadow-sm" id="fileBrowser">
      <div class="grid grid-cols-[auto_1fr_110px] items-center bg-base-200 px-3.5 py-2.5 text-[0.7rem] uppercase tracking-wider font-bold border-b border-base-300 text-base-content/50 max-sm:grid-cols-[auto_1fr_80px] max-sm:text-[0.8rem]">
        <span class="w-6" aria-hidden="true"></span>
        <span>Name</span>
        <span class="text-right">Download</span>
      </div>
      <div id="fileTreeBody" >
        <div class="grid grid-cols-[auto_1fr_110px] items-center gap-2 px-3.5 py-2 border-b border-base-200 transition-colors hover:bg-base-200 max-sm:grid-cols-[auto_1fr_80px] max-sm:text-[0.8rem] border-none">
          <span class="name-part text-base-content/50">Loading…</span>
          <span class="actions-part"></span>
        </div>
      </div>
    </section>
  </div>

  <script id="files-json" type="application/json" nonce="{{ csp_nonce }}">{% raw files_json %}</script>

  <script nonce="{{ csp_nonce }}">
    let currentAuthToken = null;
    const shareId = '{{ share_id }}';
    let allFilePaths = [];
    const FILE_ROW_GRID = 'grid grid-cols-[auto_1fr_110px] items-center gap-2 px-3.5 py-2 border-b border-base-200 transition-colors hover:bg-base-200 max-sm:grid-cols-[auto_1fr_80px] max-sm:text-[0.8rem]';

    function getAuthToken() {
      if (!currentAuthToken) currentAuthToken = sessionStorage.getItem(`share_token_${shareId}`);
      return currentAuthToken;
    }
    function setAuthToken(token) {
      currentAuthToken = token;
      sessionStorage.setItem(`share_token_${shareId}`, token);
      const secureAttr = globalThis.location.protocol === 'https:' ? '; Secure' : '';
      document.cookie = `share_token_${shareId}=${token}; path=/; max-age=3600; SameSite=Lax${secureAttr}`;
    }
    async function fetchWithAuth(url, options = {}) {
      const token = getAuthToken();
      if (token) options.headers = { ...options.headers, 'Authorization': `Bearer ${token}` };
      return fetch(url, options);
    }

    function getFileIcon(filename) {
      const ext = filename.split('.').pop().toLowerCase();
      const iconMap = {
        'txt':'📄','md':'📝','py':'🐍','js':'📜','html':'🌐','css':'🎨',
        'json':'📋','xml':'📄','csv':'📊','pdf':'📕','doc':'📘','docx':'📘',
        'xls':'📗','xlsx':'📗','ppt':'📙','pptx':'📙','zip':'📦','rar':'📦',
        'jpg':'🖼️','jpeg':'🖼️','png':'🖼️','gif':'🖼️','svg':'🖼️',
        'mp4':'🎬','avi':'🎬','mov':'🎬','mp3':'🎵','wav':'🎵',
        'exe':'⚙️','dll':'⚙️','bat':'⚙️','sh':'⚙️'
      };
      return iconMap[ext] || '📄';
    }

    function openFileWithAuth(filePath) {
      globalThis.location.href = `/shared/${shareId}/file/${encodeURIComponent(filePath)}`;
    }

    function pathParts(p) { return String(p).replaceAll('\\', '/').split('/').filter(Boolean); }

    function insertPathIntoTree(root, raw) {
      const parts = pathParts(raw);
      if (parts.length === 0) return;
      let node = root;
      for (let i = 0; i < parts.length; i++) {
        const part = parts[i];
        const last = i === parts.length - 1;
        if (!node.children.has(part)) {
          node.children.set(part, { name: part, children: new Map(), isFile: last, fullPath: last ? raw : '' });
        }
        const child = node.children.get(part);
        if (last) {
          if (!child.isFile && child.children.size > 0) return;
          child.isFile = true;
          child.fullPath = raw;
        } else if (child.isFile) {
          return;
        }
        node = child;
      }
    }

    function buildPathTree(paths) {
      const root = { name: '', children: new Map(), isFile: false, fullPath: '' };
      const sorted = [...paths].sort((a, b) => pathParts(b).length - pathParts(a).length);
      for (const raw of sorted) insertPathIntoTree(root, raw);
      return root;
    }

    function sortTreeEntries(childrenMap) {
      return [...childrenMap.entries()].sort((a, b) => {
        const A = a[1], B = b[1];
        if (A.isFile !== B.isFile) return A.isFile ? 1 : -1;
        return a[0].localeCompare(b[0], undefined, { sensitivity: 'base' });
      });
    }

    function downloadFileViaLink(filePath) {
      const a = document.createElement('a');
      a.href = `/shared/${shareId}/file/${encodeURIComponent(filePath)}?download=1`;
      a.className = 'hidden';
      a.setAttribute('download', '');
      document.body.appendChild(a);
      a.click();
      a.remove();
    }

    function getSelectedPaths() {
      return [...document.querySelectorAll('.share-file-cb:checked')].map((cb) => cb.dataset.path);
    }

    function updateSelectionUI() {
      const boxes = document.querySelectorAll('.share-file-cb');
      const selected = getSelectedPaths();
      const total = boxes.length;
      const btn = document.getElementById('downloadSelectedBtn');
      const selectAll = document.getElementById('selectAllFiles');
      const countEl = document.getElementById('selectionCount');
      const bar = document.getElementById('bulkDownloadBar');
      if (bar) bar.style.display = total > 0 ? '' : 'none';
      if (btn) {
        btn.disabled = selected.length === 0;
        btn.textContent = selected.length === total && total > 0
          ? `Download all (${total})`
          : `Download selected (${selected.length})`;
      }
      if (selectAll) {
        selectAll.checked = total > 0 && selected.length === total;
        selectAll.indeterminate = selected.length > 0 && selected.length < total;
      }
      if (countEl) {
        countEl.textContent = selected.length ? `${selected.length} of ${total} selected` : '';
      }
    }

    async function downloadPaths(paths) {
      const btn = document.getElementById('downloadSelectedBtn');
      const selectAll = document.getElementById('selectAllFiles');
      const Dl = globalThis.AirdDownloadManager;
      if (!Dl?.DownloadBatch) {
        for (let i = 0; i < paths.length; i++) {
          downloadFileViaLink(paths[i]);
          if (i < paths.length - 1) {
            await new Promise((resolve) => setTimeout(resolve, 450));
          }
        }
        updateSelectionUI();
        return;
      }
      const batch = new Dl.DownloadBatch({
        container: document.getElementById('downloadProgressContainer'),
        title: 'Share downloads',
      });
      for (const filePath of paths) {
        const enc = String(filePath).split('/').map(encodeURIComponent).join('/');
        batch.addItem(filePath, `/shared/${shareId}/file/${enc}?download=1`);
      }
      if (btn) btn.disabled = true;
      if (selectAll) selectAll.disabled = true;
      await batch.run();
      if (selectAll) selectAll.disabled = false;
      updateSelectionUI();
    }

    function wireBulkDownloadControls() {
      const selectAll = document.getElementById('selectAllFiles');
      const btn = document.getElementById('downloadSelectedBtn');
      if (selectAll) {
        selectAll.addEventListener('change', () => {
          const checked = selectAll.checked;
          document.querySelectorAll('.share-file-cb').forEach((cb) => { cb.checked = checked; });
          updateSelectionUI();
        });
      }
      if (btn) {
        btn.addEventListener('click', () => {
          const paths = getSelectedPaths();
          if (paths.length) void downloadPaths(paths);
        });
      }
      document.getElementById('fileTreeBody')?.addEventListener('change', (e) => {
        if (e.target.classList?.contains('share-file-cb')) updateSelectionUI();
      });
    }

    function renderTreeNode(node, depth) {
      if (node.isFile) {
        const row = document.createElement('div');
        row.className = FILE_ROW_GRID;
        row.style.paddingLeft = `${14 + depth * 16}px`;

        const checkWrap = document.createElement('div');
        checkWrap.className = 'flex items-center shrink-0 w-6';
        const checkbox = document.createElement('input');
        checkbox.type = 'checkbox';
        checkbox.className = 'share-file-cb checkbox checkbox-sm checkbox-primary';
        checkbox.dataset.path = node.fullPath;
        checkbox.title = 'Select for download';
        checkWrap.appendChild(checkbox);

        const nameEl = document.createElement('div');
        nameEl.className = 'min-w-0 overflow-hidden text-ellipsis whitespace-nowrap';
        const icon = document.createElement('span');
        icon.className = 'mr-2 inline-block';
        icon.textContent = getFileIcon(node.name) + '\u00A0';
        const nameSpan = document.createElement('span');
        nameSpan.textContent = node.name;
        nameEl.appendChild(icon);
        nameEl.appendChild(nameSpan);

        const action = document.createElement('div');
        action.className = 'text-right shrink-0';
        const a = document.createElement('a');
        a.href = `/shared/${shareId}/file/${encodeURIComponent(node.fullPath)}?download=1`;
        a.className = 'btn btn-primary btn-xs';
        a.title = 'Download';
        a.textContent = '⬇ Download';
        action.appendChild(a);

        row.appendChild(checkWrap);
        row.appendChild(nameEl);
        row.appendChild(action);
        if (node.fullPath) row.title = node.fullPath;
        return row;
      }

      const details = document.createElement('details');
      details.className = 'border-b border-base-200 last:border-b-0';
      if (depth === 0) details.open = true;

      const summary = document.createElement('summary');
      summary.className = 'folder-summary cursor-pointer list-none flex items-center px-3.5 py-2.5 font-semibold select-none transition-colors hover:bg-base-200';
      summary.style.paddingLeft = `${14 + depth * 16}px`;
      summary.textContent = '📁 ' + node.name;

      const wrap = document.createElement('div');
      wrap.className = 'pl-0 border-l-2 border-base-200 ml-3.5';
      sortTreeEntries(node.children).forEach(([, child]) => {
        wrap.appendChild(renderTreeNode(child, depth + 1));
      });

      details.appendChild(summary);
      details.appendChild(wrap);
      return details;
    }

    function renderFiles(files) {
      const container = document.getElementById('fileTreeBody');
      container.innerHTML = '';
      allFilePaths = Array.isArray(files) ? [...files] : [];

      if (!files || files.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'file-row';
        empty.style.border = 'none';
        empty.style.justifyContent = 'center';
        empty.style.gridTemplateColumns = '1fr';
        empty.style.textAlign = 'center';
        empty.style.padding = '32px';
        empty.style.color = 'oklch(var(--bc) / 0.5)';
        empty.textContent = 'No files available';
        container.appendChild(empty);
        updateSelectionUI();
        return;
      }

      const tree = buildPathTree(files);
      sortTreeEntries(tree.children).forEach(([, child]) => {
        container.appendChild(renderTreeNode(child, 0));
      });
      updateSelectionUI();
    }

    document.addEventListener('DOMContentLoaded', function () {
      wireBulkDownloadControls();
      try {
        const filesRaw = document.getElementById('files-json')?.textContent || '[]';
        const files = JSON.parse(filesRaw);
        renderFiles(Array.isArray(files) ? files : []);
      } catch (error) {
        console.error('Error processing files data:', error);
        const el = document.getElementById('fileTreeBody');
        if (el) {
          el.innerHTML = '';
          const err = document.createElement('div');
          err.className = 'file-row';
          err.style.border = 'none';
          err.style.color = 'oklch(var(--er))';
          err.style.padding = '20px';
          err.style.textAlign = 'center';
          err.style.gridTemplateColumns = '1fr';
          err.textContent = 'Error loading files';
          el.appendChild(err);
        }
      }
    });
  </script>
  <script src="/static/js/download-manager.js"></script>
  <script src="/static/js/theme.js"></script>
</body>
</html>
