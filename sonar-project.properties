# Exclude tests and tooling from analysis.
sonar.exclusions=**/tests/**,**/test_*.py,**/__pycache__/**,**/.venv/**,**/.pytest_cache/**

# Optional: explicitly include production source (Python under aird/)
sonar.sources=aird

