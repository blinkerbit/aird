# Exclude test files from analysis so quality gate and duplication
# apply only to production code (no need to improve test files for now).
sonar.exclusions=**/tests/**,**/test_*.py,**/__pycache__/**,**/.venv/**,**/.pytest_cache/**

# Optional: explicitly include production source (Python under aird/)
sonar.sources=aird

# Optional: test paths (excluded from main analysis via exclusions above;
# uncomment if you later want coverage to include them)
# sonar.tests=tests
# sonar.python.coverage.reportPaths=coverage.xml
