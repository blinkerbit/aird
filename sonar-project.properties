# Exclude tests, generated bundles, and vendored JS from analysis.
sonar.exclusions=**/tests/**,**/test_*.py,**/__pycache__/**,**/.venv/**,**/.pytest_cache/**,**/aird/static/js/share/app.js,**/aird/static/js/vendor/**

# Optional: explicitly include production source (Python under aird/)
sonar.sources=aird

# Optional: test paths (excluded from main analysis via exclusions above;
# uncomment if you later want coverage to include them)
# sonar.tests=tests
# sonar.python.coverage.reportPaths=coverage.xml
